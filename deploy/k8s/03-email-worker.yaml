# El Secret "resend-credentials" (keys: apiKey, recipients) NO se versiona:
# el repo es público. Se crea/rota a mano en el clúster:
#   kubectl create secret generic resend-credentials -n notifications \
#     --from-literal=apiKey='<api key de resend.com>' \
#     --from-literal=recipients='dest1@ejemplo.com,dest2@ejemplo.com' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-worker
  namespace: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-worker
  template:
    metadata:
      labels:
        app: email-worker
    spec:
      containers:
        - name: email-worker
          image: torment93/ns-notifications-emailworker:latest
          imagePullPolicy: Always
          env:
            - name: RabbitMq__Host
              value: rabbitmq
            - name: RabbitMq__Port
              value: "5672"
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
            - name: Resend__ApiKey
              valueFrom:
                secretKeyRef:
                  name: resend-credentials
                  key: apiKey
            - name: Resend__Recipients
              valueFrom:
                secretKeyRef:
                  name: resend-credentials
                  key: recipients
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
